expected_output: >
  A Chapter 4 blueprint at
  docs/40-blueprints/book-1/chapter-04-priority-tier/blueprint.md, authored from the
  chapter-blueprint template and modeled on the Chapter 3 blueprint, covering scene
  beats, single close-third Eli viewpoint discipline, the surging-grid crisis and the
  hand-built microgrid from incompatible sources, the load-shedding-as-governance
  conflict with Talia, Nolan's introduction and his admission that hand labor cannot
  keep enough machines alive, June's proposal to enter Northglass, Eli's disproportionate
  and unexplained refusal, the second authentication loss, and the irreversible decision
  to go (the ending hook, "meet me before sunrise"). The blueprint must DECLARE Chapter
  4's reveal level explicitly: the deep layer opens only to Northglass-as-place and Eli's
  dread; Morrow, the buried drive, the resume-not-build truth, the six-years-ago encounter,
  "Escaping," Crown's specifics, named Mosaic knowledge, and Eli's real reason for going
  all stay gated. The blueprint is a plan, not prose, and must not advance reveals beyond
  the sanctioned depth.

canon_rules:
  - "The bibles outrank memory, the graph, and any index in every conflict."
  - "Treat plot files and blueprints as approved plans, not already-established events."
  - "Treat active canon files as authoritative by subject. Treat approved manuscript (Chapters 1 to 3) as established canon."
  - "Never use archived files as active canon. No archive/ path may be loaded here."
  - "Flag document conflicts; never silently resolve or average them."
  - "Single close-third viewpoint: Eli, the entire chapter. Never head-hop; Nolan, Talia, June, and Lena are rendered only as Eli perceives them; one viewpoint per chapter (Decision 030)."
  - "Do not give Morrow or Crown capabilities not yet established. Morrow does not appear and is not implied in Chapter 4; Northglass is dormant hardware and orchestration capability at place-level, not a named intelligence."
  - "DECLARED REVEAL LEVEL: Chapter 4 BEGINS opening the deep layer, but only to Northglass-as-a-place-Eli-resolves-to-enter and his disproportionate, unexplained dread. Do NOT expose or hint Morrow, the buried 128 TB drive, the six-years-ago first encounter, 'Escaping,' the resume-not-build truth, Crown's specifics, the restricted Mosaic knowledge named as such, or Eli's real reason for going. The reader leaves Chapter 4 with the question, not the answer (chapter-04.md: the buried project is not hinted to June or the reader beyond his disproportionate reluctance; reveal-management.md; act-1-revision sections 3, 5, 10)."
  - "Do not name the dead man (Eli does not know his name) and do not surface any of his Chapter-2 [reveal: Book 1] facts. He is an off-page absence."
  - "Keep the supporting cast's gated interiors gated: Nolan's failing health, June's concealed father-channel, and Talia's contingency plans are all [reveal: Book 1] and not Eli's to know; use only their public functions."
  - "The decision to enter Northglass is a reversal driven by accumulating loss (a second clinic system loses authentication, the machines failing one by one, hand labor declared insufficient), not a clean resolve. No 'and so he decided'; no save-the-neighborhood speech (act-1-timeline; act-1-revision Q4)."
  - "Load-shedding is political as well as technical; keeping the clinic operational may mean shutting off residential heating. Dramatize the consent conflict; do not let the narration settle it (energy.md)."
  - "Avoid em dashes in drafted prose and project copy (Decision 039)."
  - "Keep service withdrawal contractual and administrative, not apocalyptic; the surging grid is real instability, not collapse; the world stays physically recognizable (Decisions 002, 038)."
  - "Continuity must be exact with Chapters 1 to 3: the withdrawal and the midday tier drop with no emergency restoration; the off-page death and grief; the clinic and its remaining authentication-dependent systems; Eli's trade and his proven hand-labor limit; the neighborhood's incompatible power sources (EVs as storage, etc.)."

relevant_validation_checks:
  - "validate-links.py: every Markdown link and front-matter related/source_documents path in the blueprint resolves on disk. (Focus-section entity pointers are written as plain backtick paths, not Markdown links, matching the Ch3 convention; the not-yet-existing neighborhood power-coordination path is named only in the flags as plain text.)"
  - "validate-metadata.py: the blueprint declares all eight required front-matter fields (title, document_type, status, authority, summary, tags, related, source_documents) and each Scene Metadata block carries date_iso and start_iso in ISO 8601."
  - "Archive safety: no archive/ path appears in required_files, optional_files, or loading_order."
  - "Scope check: the exclude_files entries (Morrow/Crown profiles, technology/northglass.md interior, Mars, later-act timelines, Kade/Jonah/Mara) are absent from the loaded set."
  - "Reveal-safety check: the loaded northglass.md, reveal-management.md, and act-1-revision are present as REVEAL CONTROL; no loaded file forces a Morrow / buried-drive / resume-not-build / 'Escaping' / real-reason reveal into Chapter 4's scope; the deep layer opens only to Northglass-as-place and Eli's dread."
  - "build-context-pack.py: fails on any missing required file and warns on any missing optional file."
