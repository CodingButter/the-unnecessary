# Per-chapter context manifest for Book One, Chapter 4 ("Priority Tier").
# Scoped to Chapter 4 only. Mirrors the Chapter 3 manifest structure, narrowed to
# Chapter 4's actual cast (Eli viewpoint; Nolan, Talia, and June introduced in the
# grid crisis; Lena carried from Ch3 as the shared grief and the clinic's keeper; the
# dead man an off-page absence) and systems (the surging low-tier grid, the hand-built
# microgrid from incompatible sources, load-shedding as governance, the clinic's
# failing authentication-dependent systems, and Northglass named at place-level).
# All paths are repository-root-relative and were verified to exist on disk.
# Never reference any archive/ path. Optional or possibly-absent paths go under optional_files.

task_name: "blueprint-chapter-04-priority-tier"

purpose: >
  Load only the canon, plot, style, continuity, and decision context needed to create
  or draft the Chapter 4 blueprint. Chapter 4 is Eli Rook's viewpoint across Saturday,
  October 4, 2053, the day after the off-page death, in which the abstract service
  withdrawal becomes a physical grid crisis and Eli is driven, against his own buried
  reluctance, to commit to entering Northglass. The chapter opens in the grief Chapter
  3 ended on (grief, not yet a plan) and turns grief into pressure: a surging low-tier
  grid damages further equipment near Lena's clinic and drains the backup batteries
  faster than budgeted; Eli and Nolan try to braid residential solar, EVs, commercial
  batteries, two generators, and the clinic's backup into one hand-held microgrid
  across incompatible control protocols; Talia forces the consent question (who has
  authority to disconnect homes to keep the clinic alive, a political act, not a
  technical one); the grid surges again; Nolan admits hand labor cannot keep enough
  machines alive; June proposes entering Northglass for orchestration capability; Eli
  refuses with a vehemence the stated Asterion-reporting risk cannot carry; a second
  clinic system loses authentication; Eli changes his mind and tells June to meet him
  before sunrise. This manifest INCLUDES northglass.md (at place-level), reveal-
  management.md, and the act-1 revision as REVEAL CONTROL, because Chapter 4 is where
  the deep layer BEGINS to open, but only as far as Northglass-as-a-place-he-resolves-
  to-enter and his disproportionate dread. It deliberately EXCLUDES the Morrow and
  Crown profiles, technology/northglass.md (the facility interior), Mars material, and
  later-act timelines, because Morrow, the buried 128 TB drive, the six-years-ago first
  encounter, "Escaping," the resume-not-build truth, and Eli's real reason for going
  all stay GATED for the Northglass arrival and turn-on (Oct 5 to 6).

