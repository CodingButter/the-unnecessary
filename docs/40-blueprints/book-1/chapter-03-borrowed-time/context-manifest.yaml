# Per-chapter context manifest for Book One, Chapter 3 ("Borrowed Time").
# Scoped to Chapter 3 only. Mirrors the Chapter 2 manifest structure, narrowed to
# Chapter 3's actual cast (Eli alone; Lena in brief doorway check-ins and a morning
# message; the man on the respirator unseen and unnamed; an unnamed Asterion manager
# in flashback) and systems (the clinic's three machines, the records server, the
# emulation/reflash work, cloud-dependency, medicine, energy).
# All paths are repository-root-relative and were verified to exist on disk.
# Never reference any archive/ path. Optional or possibly-absent paths go under optional_files.

task_name: "blueprint-chapter-03-borrowed-time"

purpose: >
  Load only the canon, plot, style, continuity, and decision context needed to
  create or draft the Chapter 3 blueprint. Chapter 3 is Eli Rook's viewpoint on
  the night of Friday October 3 into the dawn of Saturday October 4, 2053: a single
  close-third POV chapter, alone in Lena's clinic back room, working two problems at
  once against the midnight deadline (reflashing the abandoned medical devices'
  firmware AND racing to convert the dusty back-room records server into a local
  emulation / stand-in authentication server), braided with an escalating sequence
  of POV-safe Asterion-datacenter flashbacks that invert the adored, effortless
  golden boy against the present failure. The chapter runs two deliberate layers in
  counterbalance: dense, authentic, intentionally opaque technical passages, and
  brief Eli-to-Lena translation beats that land the basic stakes for the layperson.
  He does not finish; midnight passes; the machines keep running only on borrowed
  uptime because nothing restarted them; he will not forge the respirator's auth
  (it would slow-kill the man). He goes home spent, and at 6 a.m. Lena's message
  wakes him: the power went out, the generators were too slow, the man on the
  respirator is gone, off the page, a death from the systemic power failure, not a
  forged auth. What rises is grief, not resolve. This manifest deliberately excludes
  Mars material, later-act timelines, Kade/Jonah/Mara material, Northglass, and the
  Morrow/Crown profiles, because the Chapter 3 flashbacks are the SHALLOW seed only
  and must not expose Morrow, the buried drive, the six-years-ago first encounter,
  "Escaping," or the resume-the-project move, which belong to the later Northglass
  return.

