  A Chapter 3 blueprint at
  docs/40-blueprints/book-1/chapter-03-borrowed-time/blueprint.md, authored from the
  chapter-blueprint template and modeled on the Chapter 2 blueprint, covering scene
  beats, single close-third Eli viewpoint discipline, the two-front technical work
  (firmware reflashing and the local emulation / stand-in authentication server) in
  deliberately dense, authentic, opaque detail, the escalating POV-safe Asterion
  flashback braid (shallow seed only), the counterbalancing Eli-to-Lena layperson-
  translation beats, the borrowed-uptime reprieve-that-is-not-one, the refusal to
  forge the respirator's auth, and the off-page death and grief-not-resolve ending.
  The blueprint is a plan, not prose, and must not advance reveals beyond what
  Chapter 3 establishes.

canon_rules:
  - "The bibles outrank memory, the graph, and any index in every conflict."
  - "Treat plot files and blueprints as approved plans, not already-established events."
  - "Treat active canon files as authoritative by subject. Treat approved manuscript (Chapters 1 and 2) as established canon."
  - "Never use archived files as active canon. No archive/ path may be loaded here."
  - "Flag document conflicts; never silently resolve or average them."
  - "Single close-third viewpoint: Eli, the entire chapter, including inside the flashbacks (his own memory, POV-safe). Never head-hop; Lena and the unseen patient are rendered only as Eli perceives them; one viewpoint per chapter."
  - "Do not give Morrow or Crown capabilities not yet established. Morrow does not appear and is not implied in Chapter 3."
  - "REVEAL-SAFETY: the Asterion flashbacks are the SHALLOW seed only (the golden boy, the corporate world, the adoration). Do not expose or hint at Morrow, the buried drive, the six-years-ago first encounter, 'Escaping,' the resume-the-project move, or Northglass. The deep reveal lands later, near the turn-on (act-1-revision sections 3, 5, 10, two-flashback-layers rule)."
  - "Do not name the man on the respirator (Eli does not know his name) and do not surface any of his Chapter-2 [reveal: Book 1] facts. He is a deliberate blur, the abstract stake and the dawn absence."
  - "The death is off the page and inferred from Lena's 6 a.m. message, never staged, and is caused by the systemic power failure (the midday tier drop and withdrawn emergency restoration, generators lagging), NOT by any forged auth (Decision 052; act-1-timeline.md)."
  - "The ending is grief, not a decision. No 'and so he decided.' Nothing is named (act-1-timeline.md; act-1-revision Q4)."
  - "The deliberate technical density is sanctioned and intended to be opaque to laypeople and authentic to technical readers; it must be REAL, credible engineering, never technobabble. Only the basic stakes and dread must land for every reader, carried by the Eli-to-Lena translation beats."
  - "The Eli-to-Lena translation check-ins are spoken and earlier in the evening, inside Lena's Chapter 2 rounds window; the approved Chapter 2 silent late glimpse (no speech, no entry, Eli does not turn) must be preserved exactly. The light extension of Chapter 2's selective POV is flagged for an author ruling in the blueprint, not silently resolved."
  - "Avoid em dashes in drafted prose and project copy."
  - "Keep service withdrawal contractual and administrative, not apocalyptic. The world stays physically recognizable."
  - "Continuity must be exact with Chapters 1 and 2: the three systems by name (diagnostic scanner, medication-management unit, respiratory controller); the 23:59 / midnight deadline; the October 3 into October 4 dates; the man aged 61 on the respiratory controller; the dusty underpowered back-room records server; the midday power-tier drop with no emergency restoration; the borrowed-uptime mechanism; the off-page 6 a.m. death."

relevant_validation_checks:
  - "validate-links.py: every Markdown link and front-matter related/source_documents path in the blueprint resolves on disk. (Non-existent entity pointers, e.g. the Asterion datacenter, are written as plain text in the Focus section, not as Markdown links, so they are not resolved.)"
  - "validate-metadata.py: the blueprint declares all eight required front-matter fields (title, document_type, status, authority, summary, tags, related, source_documents)."
  - "Archive safety: no archive/ path appears in required_files, optional_files, or loading_order."
  - "Scope check: the exclude_files entries (Mars, later-act timelines, Jonah/Kade/Mara, Northglass, Morrow/Crown AI profiles) are absent from the loaded set."
  - "Reveal-safety check: no loaded file forces a Morrow / buried-drive / Northglass / 'Escaping' / resume-the-project reveal into Chapter 3's scope; the Morrow-origin revision is loaded only as a control on what must NOT surface (the shallow-seed flashback layer) and for the borrowed-uptime and obstacle-correction facts that DO belong here."
  - "build-context-pack.py: fails on any missing required file and warns on any missing optional file."
