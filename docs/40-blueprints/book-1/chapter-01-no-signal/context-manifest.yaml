# Scoped to Chapter 1 only. Authored per spec Phase 7.
# All paths are repository-root-relative and were verified to exist on disk.
# Never reference any archive/ path. Optional or possibly-absent paths go under optional_files.

task_name: "blueprint-chapter-01-no-signal"

purpose: >
  Load only the canon, plot, style, continuity, and decision context needed to
  create the Chapter 1 blueprint. Chapter 1 is Eli's viewpoint on Friday,
  October 3, 2053: it introduces the world's withdrawal, the difference between
  destruction and abandonment, Eli's repair work, and the clinic's coming loss of
  manufacturer authentication. This manifest deliberately excludes Mars material,
  later-act timelines, Mara's profile, and unrelated chapters.

