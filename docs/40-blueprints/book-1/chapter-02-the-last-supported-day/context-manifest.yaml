expected_output: >
  A Chapter 2 blueprint at
  docs/40-blueprints/book-1/chapter-02-the-last-supported-day/blueprint.md,
  authored from the chapter-blueprint template and modeled on the Chapter 1
  blueprint, covering scene beats, single close-third Lena viewpoint discipline,
  the setup-through-Lena hand-off, the unsupported-care worldbuilding, the
  named-patient triage decision made without knowing what midnight does, and the
  ending hand-off to Eli alone in the back room. The blueprint is a plan, not prose,
  and must not advance reveals beyond what Chapter 2 establishes.

canon_rules:
  - "The bibles outrank memory, the graph, and any index in every conflict."
  - "Treat plot files and blueprints as approved plans, not already-established events."
  - "Treat active canon files as authoritative by subject. Treat any approved manuscript as established canon."
  - "Never use archived files as active canon. No archive/ path may be loaded here."
  - "Flag document conflicts; never silently resolve or average them."
  - "Single close-third viewpoint: Lena, the entire chapter. Never head-hop to Eli; see Eli only through Lena; never enter the back room. One viewpoint per chapter."
  - "Do not give Morrow or Crown capabilities not yet established. Morrow does not appear and is not implied in Chapter 2."
  - "REVEAL-SAFETY: Lena does not know about Morrow, the buried-ASI secret, the resume-the-project plot, or what midnight does to the machines. Do not expose any of these. Eli's work reads as unauthorized authentication-forgery and repair, nothing more."
  - "Do not pre-empt the borrowed-uptime outcome or the off-page death; those belong to Eli's later vigil chapter (Decision 052). Chapter 2 ends before midnight and before any outcome."
  - "Do not expose Lena's stolen, traceable credentials; held as texture only (Decision 024)."
  - "Lena is a moral counterweight, not the automatic moral authority; she can be wrong, secretive, and forced into compromise (Decision 024)."
  - "Avoid em dashes in drafted prose and project copy."
  - "Keep service withdrawal contractual and administrative, not apocalyptic. The world stays physically recognizable."
  - "Continuity must be exact with Chapter 1: the three systems by name (diagnostic scanner, medication-management unit, respiratory controller), the 23:59 / midnight deadline, the October 3 date, the failing mesh link, the midday power-tier drop, the man aged 61 on the respiratory controller."

relevant_validation_checks:
  - "validate-links.py: every path in this manifest resolves on disk."
  - "validate-metadata.py: every loaded active document carries required metadata fields."
  - "Archive safety: no archive/ path appears in required_files, optional_files, or loading_order."
  - "Scope check: the exclude_files entries (Mars, later-act timelines, Jonah/Kade/Mara, Morrow/Crown AI profiles) are absent from the loaded set."
  - "Reveal-safety check: no loaded file forces a Morrow / buried-ASI / borrowed-uptime / midnight-outcome reveal into Chapter 2's scope; the Morrow-origin revision is loaded only as a control on what must NOT surface."
  - "build-context-pack.py: fails on any missing required file and warns on any missing optional file."
