# Per-chapter context manifest for Book One, Chapter 2 ("The Last Supported Day").
# Scoped to Chapter 2 only. Mirrors the Chapter 1 manifest structure, narrowed to
# Chapter 2's actual cast (Lena, Eli) and systems (the clinic's three machines,
# cloud-dependency, medicine).
# All paths are repository-root-relative and were verified to exist on disk.
# Never reference any archive/ path. Optional or possibly-absent paths go under optional_files.

task_name: "blueprint-chapter-02-the-last-supported-day"

purpose: >
  Load only the canon, plot, style, continuity, and decision context needed to
  create or draft the Chapter 2 blueprint. Chapter 2 is Lena Okafor's viewpoint on
  Friday, October 3, 2053, evening into night: a single close-third POV chapter at
  her independent community clinic that shows technological withdrawal in human
  terms through a non-engineer, grounds the clinic's three losing-authentication
  systems through Lena's eyes as Eli arrives, has her triage named patients against
  the midnight deadline without knowing what midnight does, and hands the night
  forward to Eli alone in the back room. This manifest deliberately excludes Mars
  material, later-act timelines, Jonah and Kade material, and anything that would
  expose Morrow, the buried-ASI secret, or the borrowed-uptime / death outcome that
  belongs to Eli's later vigil chapter.

