task_name: "continuity-check"
purpose: >
  Verify that a chapter blueprint or drafted chapter is consistent with
  established continuity. Cross-check character states, what each character
  knows at a given point, relationship status, technology state, and the
  ledger of setups and payoffs against the canonical timeline. Surface any
  contradiction with the authority that controls it rather than resolving it
  silently. No manuscript chapters are approved yet, so the manuscript files
  are optional and the continuity files hold pre-draft starting conditions.

required_files:
  # Continuity index and global starting conditions read first.
  - "docs/60-continuity/index.md"
  - "docs/60-continuity/global-continuity.md"
  # Per-character continuity states.
  - "docs/60-continuity/character-states/index.md"
  - "docs/60-continuity/character-states/eli-rook.md"
  - "docs/60-continuity/character-states/jonah-mercer.md"
  - "docs/60-continuity/character-states/adrian-kade.md"
