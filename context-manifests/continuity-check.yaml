  - "docs/60-continuity/character-states/june-park.md"
  - "docs/60-continuity/character-states/mara-voss.md"
  - "docs/60-continuity/character-states/talia-reed.md"
  - "docs/60-continuity/character-states/nolan-avery.md"
  - "docs/60-continuity/character-states/sera-vale.md"
  - "docs/60-continuity/character-states/celeste-mercer.md"
  - "docs/60-continuity/character-states/nora-bell.md"
  - "docs/60-continuity/character-states/morrow.md"
  - "docs/60-continuity/character-states/crown.md"
  # Knowledge state: who knows what, when. Critical for reveal management.
  - "docs/60-continuity/knowledge-state/index.md"
  - "docs/60-continuity/knowledge-state/eli-rook.md"
  - "docs/60-continuity/knowledge-state/jonah-mercer.md"
  - "docs/60-continuity/knowledge-state/adrian-kade.md"
  - "docs/60-continuity/knowledge-state/lena-okafor.md"
  - "docs/60-continuity/knowledge-state/june-park.md"
  - "docs/60-continuity/knowledge-state/mara-voss.md"
  - "docs/60-continuity/knowledge-state/talia-reed.md"
  - "docs/60-continuity/knowledge-state/nolan-avery.md"
  - "docs/60-continuity/knowledge-state/sera-vale.md"
  - "docs/60-continuity/knowledge-state/celeste-mercer.md"
  - "docs/60-continuity/knowledge-state/nora-bell.md"
  - "docs/60-continuity/knowledge-state/morrow.md"
  - "docs/60-continuity/knowledge-state/crown.md"
  # Relationship continuity.
  - "docs/60-continuity/relationships/index.md"
  - "docs/60-continuity/relationships/eli-and-jonah.md"
  - "docs/60-continuity/relationships/eli-and-june.md"
  - "docs/60-continuity/relationships/eli-and-kade.md"
  - "docs/60-continuity/relationships/eli-and-lena.md"
  - "docs/60-continuity/relationships/eli-and-morrow.md"
  - "docs/60-continuity/relationships/eli-and-nora.md"
  - "docs/60-continuity/relationships/eli-and-talia.md"
  - "docs/60-continuity/relationships/jonah-and-celeste.md"
  - "docs/60-continuity/relationships/jonah-and-kade.md"
  - "docs/60-continuity/relationships/kade-and-crown.md"
  - "docs/60-continuity/relationships/kade-and-mara.md"
  - "docs/60-continuity/relationships/morrow-and-community.md"
